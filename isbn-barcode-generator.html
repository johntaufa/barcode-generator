<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISBN Barcode Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { margin-bottom: 8px; font-size: 1.8rem; }
  .subtitle { color: #666; margin-bottom: 32px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; width: 100%; max-width: 480px; }
  input[type="text"] { flex: 1; padding: 12px 16px; font-size: 1rem; border: 2px solid #ddd; border-radius: 8px; outline: none; transition: border-color 0.2s; font-family: monospace; }
  input[type="text"]:focus { border-color: #4a90d9; }
  button { padding: 12px 24px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
  .btn-primary { background: #4a90d9; color: #fff; }
  .btn-primary:hover { background: #3a7bc8; }
  .btn-download { background: #27ae60; color: #fff; margin-top: 16px; }
  .btn-download:hover { background: #219a52; }
  .error { color: #e74c3c; font-size: 0.9rem; margin-bottom: 12px; min-height: 1.2em; }
  .barcode-container { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; margin-top: 16px; display: none; flex-direction: column; align-items: center; }
  canvas { max-width: 100%; }
  .info { margin-top: 32px; max-width: 480px; font-size: 0.85rem; color: #888; line-height: 1.5; }
</style>
</head>
<body>

<h1>ISBN Barcode Generator</h1>
<p class="subtitle">Generate EAN-13 barcodes from ISBN numbers</p>

<div class="input-row">
  <input type="text" id="isbnInput" placeholder="Enter ISBN (10 or 13 digits)" maxlength="17">
  <button class="btn-primary" id="generateBtn">Generate</button>
</div>
<div class="error" id="error"></div>

<div class="barcode-container" id="barcodeContainer">
  <canvas id="barcodeCanvas"></canvas>
  <button class="btn-download" id="downloadBtn">Download PNG</button>
</div>

<div class="info">
  <strong>Supported formats:</strong> ISBN-10 (10 digits) and ISBN-13 (13 digits).
  Hyphens and spaces are automatically removed. ISBN-10 values are converted to ISBN-13.
</div>

<script src="barcode.js"></script>
<script>
function formatISBNLabel(isbn13) {
  // Format as "ISBN 978-x-xxx-xxxxx-x" using the EAN/Bookland grouping:
  // ISBN prefix (978/979) - registration group (1 digit) - registrant (3 digits) - publication (5 digits) - check
  return 'ISBN ' + isbn13.slice(0,3) + '-' + isbn13[3] + '-' + isbn13.slice(4,7) + '-' + isbn13.slice(7,12) + '-' + isbn13[12];
}

function drawBarcode(canvas, isbn13) {
  const ctx = canvas.getContext('2d');

  const WIDTH = 600;
  const barWidth = 5;
  const isbnLabelFontSize = 36;
  const isbnTopPad = 50;
  const isbnLabelHeight = 40;
  const topPad = 8;
  const barHeight = 270;
  const guardExtra = 25;
  const fontSize = 36;
  const totalModules = 95;
  const HEIGHT = isbnTopPad + isbnLabelHeight + topPad + barHeight + guardExtra + fontSize + 8;

  canvas.width = WIDTH;
  canvas.height = HEIGHT;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Draw ISBN label above the barcode
  ctx.fillStyle = '#000';
  ctx.font = `bold ${isbnLabelFontSize}px "OCR-B", "Courier New", monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(formatISBNLabel(isbn13), WIDTH / 2, isbnTopPad + 4);

  const bars = encodeEAN13(isbn13);

  // Center the barcode area, with space for leading digit on the left
  const barsWidth = totalModules * barWidth; // 475
  const leadingDigitWidth = 40;
  const totalBarArea = leadingDigitWidth + barsWidth;
  const offsetX = Math.floor((WIDTH - totalBarArea) / 2) + leadingDigitWidth;
  const barTop = isbnTopPad + isbnLabelHeight + topPad;

  ctx.fillStyle = '#000';

  for (let i = 0; i < bars.length; i++) {
    if (bars[i]) {
      const isGuard = i < 3 || (i >= 45 && i < 50) || i >= 92;
      const h = isGuard ? barHeight + guardExtra : barHeight;
      ctx.fillRect(offsetX + i * barWidth, barTop, barWidth, h);
    }
  }

  // Draw text using OCR-B style monospace
  ctx.fillStyle = '#000';
  ctx.font = `bold ${fontSize}px "OCR-B", "Courier New", monospace`;
  ctx.textBaseline = 'top';
  const textY = barTop + barHeight + 2;

  // Leading digit — left of start guard
  ctx.textAlign = 'right';
  ctx.fillText(isbn13[0], offsetX - 4, textY);

  // Left group (digits 1-6) — evenly spaced under left bars
  ctx.textAlign = 'center';
  const leftStart = offsetX + 3 * barWidth; // after start guard
  for (let i = 0; i < 6; i++) {
    const x = leftStart + (i + 0.5) * 7 * barWidth;
    ctx.fillText(isbn13[i + 1], x, textY);
  }

  // Right group (digits 7-12) — evenly spaced under right bars
  const rightStart = offsetX + 50 * barWidth; // after center guard
  for (let i = 0; i < 6; i++) {
    const x = rightStart + (i + 0.5) * 7 * barWidth;
    ctx.fillText(isbn13[i + 7], x, textY);
  }

  // Convert to black and white (1-bit per pixel via grayscale threshold)
  const imageData = ctx.getImageData(0, 0, WIDTH, HEIGHT);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
    const bw = gray < 128 ? 0 : 255;
    data[i] = bw;
    data[i+1] = bw;
    data[i+2] = bw;
    data[i+3] = 255;
  }
  ctx.putImageData(imageData, 0, 0);
}

const isbnInput = document.getElementById('isbnInput');
const errorEl = document.getElementById('error');
const container = document.getElementById('barcodeContainer');
const canvas = document.getElementById('barcodeCanvas');
let generatedIsbn = '';

function generate() {
  const cleaned = cleanISBN(isbnInput.value);

  errorEl.textContent = '';
  container.style.display = 'none';

  if (!cleaned) {
    errorEl.textContent = 'Please enter an ISBN.';
    return;
  }

  let isbn13;

  if (cleaned.length === 10) {
    if (!validateISBN10(cleaned)) {
      errorEl.textContent = 'Invalid ISBN-10 checksum.';
      return;
    }
    isbn13 = isbn10to13(cleaned);
  } else if (cleaned.length === 13) {
    if (!validateISBN13(cleaned)) {
      errorEl.textContent = 'Invalid ISBN-13 checksum.';
      return;
    }
    isbn13 = cleaned;
  } else {
    errorEl.textContent = 'ISBN must be 10 or 13 digits.';
    return;
  }

  if (!isbn13.startsWith('978') && !isbn13.startsWith('979')) {
    errorEl.textContent = 'ISBN-13 must start with 978 or 979.';
    return;
  }

  drawBarcode(canvas, isbn13);
  generatedIsbn = isbn13;
  container.style.display = 'flex';
}

async function toGrayscalePNG(canvas) {
  const ctx = canvas.getContext('2d');
  const { width, height } = canvas;
  const rgba = ctx.getImageData(0, 0, width, height).data;

  // Build raw scanlines: filter byte (0=None) + 1 grayscale byte per pixel
  const raw = new Uint8Array((1 + width) * height);
  for (let y = 0; y < height; y++) {
    const rowOffset = y * (1 + width);
    raw[rowOffset] = 0; // filter: None
    for (let x = 0; x < width; x++) {
      raw[rowOffset + 1 + x] = rgba[(y * width + x) * 4]; // R channel (already B&W)
    }
  }

  // Zlib-compress scanlines
  const cs = new CompressionStream('deflate');
  const writer = cs.writable.getWriter();
  writer.write(raw);
  writer.close();
  const compressed = new Uint8Array(await new Response(cs.readable).arrayBuffer());

  function crc32(buf) {
    let c = 0xffffffff;
    for (let i = 0; i < buf.length; i++) {
      c ^= buf[i];
      for (let j = 0; j < 8; j++) c = (c >>> 1) ^ (c & 1 ? 0xedb88320 : 0);
    }
    return (c ^ 0xffffffff) >>> 0;
  }

  function chunk(type, data) {
    const t = new TextEncoder().encode(type);
    const buf = new Uint8Array(4 + 4 + data.length + 4);
    const v = new DataView(buf.buffer);
    v.setUint32(0, data.length);
    buf.set(t, 4);
    buf.set(data, 8);
    const forCrc = new Uint8Array(4 + data.length);
    forCrc.set(t, 0);
    forCrc.set(data, 4);
    v.setUint32(8 + data.length, crc32(forCrc));
    return buf;
  }

  // IHDR: color type 0 = grayscale, bit depth 8
  const ihdr = new Uint8Array(13);
  const iv = new DataView(ihdr.buffer);
  iv.setUint32(0, width);
  iv.setUint32(4, height);
  ihdr[8] = 8; ihdr[9] = 0; ihdr[10] = 0; ihdr[11] = 0; ihdr[12] = 0;

  const sig = new Uint8Array([137, 80, 78, 71, 13, 10, 26, 10]);
  const parts = [sig, chunk('IHDR', ihdr), chunk('IDAT', compressed), chunk('IEND', new Uint8Array(0))];
  const png = new Uint8Array(parts.reduce((s, p) => s + p.length, 0));
  let off = 0;
  for (const p of parts) { png.set(p, off); off += p.length; }
  return URL.createObjectURL(new Blob([png], { type: 'image/png' }));
}

async function download() {
  if (!generatedIsbn) return;
  const url = await toGrayscalePNG(canvas);
  const link = document.createElement('a');
  link.download = `barcode-${generatedIsbn}.png`;
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);
}

document.getElementById('generateBtn').addEventListener('click', generate);
document.getElementById('downloadBtn').addEventListener('click', download);
isbnInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
